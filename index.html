<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apex Log – AMS2 Strecken-Log</title>
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" href="icon-512.png" type="image/png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b0b0d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Apex Log" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0b0d;
    --bg-alt: #0f1013;
    --surface: #16171b;
    --surface-2: #1c1e23;
    --border: #2a2c32;
    --red: #e10600;
    --red-light: #ff453a;
    --text: #f2f2f0;
    --text-muted: #8a8d93;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3 {
    font-family: var(--font-display);
    margin: 0;
  }

  .flag-strip {
    height: 6px;
    width: 100%;
    background-image: repeating-linear-gradient(
      90deg,
      var(--red) 0px, var(--red) 14px,
      #1a1a1a 14px, #1a1a1a 28px
    );
    opacity: 0.9;
  }

  .site-header {
    background: linear-gradient(180deg, var(--bg-alt), var(--bg));
    border-bottom: 1px solid var(--border);
    padding: 28px 20px 22px;
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
  }

  .header-top-bar {
    display: flex;
    justify-content: flex-end;
  }

  .auth-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }

  .auth-status {
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .login-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    z-index: 50;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    min-width: 240px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
  }

  .login-dropdown[hidden] { display: none; }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .login-dropdown-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 2px;
  }

  .login-dropdown .form-error { margin-top: 10px; }

  .login-input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    width: 100%;
  }

  .locked-message {
    font-size: 0.85rem;
    color: var(--text-muted);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 0;
  }

  .logo-banner {
    display: block;
    width: 100%;
    height: auto;
    max-height: 160px;
    object-fit: contain;
    object-position: left center;
    margin: 6px 0 10px;
  }

  .eyebrow {
    font-family: var(--font-body);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0;
  }

  .entry-panel-toggle {
    width: 100%;
    background: none;
    border: none;
    padding: 0 0 18px;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    text-align: left;
  }

  .entry-panel-toggle h2 { margin-bottom: 0; }

  .entry-panel-chevron {
    color: var(--text-muted);
    font-size: 0.9rem;
    transition: transform 0.15s ease;
  }

  .entry-panel-toggle[aria-expanded="true"] .entry-panel-chevron {
    transform: rotate(180deg);
  }

  .entry-panel-body[hidden] { display: none; }

  .entry-panel-body {
    display: grid;
    gap: 16px;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  section + section { margin-top: 44px; }

  .new-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 22px 26px;
  }

  .new-entry h2, .entries h2 {
    font-size: 1.05rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .entries-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .entries-header h2 { margin-bottom: 0; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .random-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red-light);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .random-btn:hover { background: var(--red); color: #fff; }

  @keyframes highlightPulse {
    0% { box-shadow: 0 0 0 0 rgba(225, 6, 0, 0.85); border-color: var(--red); }
    100% { box-shadow: 0 0 0 16px rgba(225, 6, 0, 0); border-color: var(--border); }
  }

  .entry-card.highlight { animation: highlightPulse 1.6s ease-out; }

  .stats-line {
    margin: 8px 0 0;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .search-input {
    width: 100%;
    margin-top: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
  }

  .search-input::placeholder { color: #55575e; }

  .search-input:focus {
    outline: 2px solid var(--red-light);
    outline-offset: 2px;
  }

  .search-input::-webkit-search-cancel-button { cursor: pointer; }

  .view-toggle {
    display: inline-flex;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }

  .view-toggle-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .view-toggle-btn:hover:not(.active) { color: var(--text); }

  .view-toggle-btn.active {
    background: var(--red);
    color: #fff;
  }

  .entries-body {
    display: grid;
    gap: 32px;
    margin-top: 18px;
  }

  .entry-group {
    display: grid;
    gap: 14px;
  }

  .group-heading {
    font-family: var(--font-display);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    color: var(--text);
    margin: 0;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .group-count {
    font-family: var(--font-body);
    font-size: 0.68rem;
    font-weight: 500;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 1px 8px;
    border-radius: 999px;
    letter-spacing: 0;
  }

  .count-badge {
    font-family: var(--font-body);
    font-size: 0.72rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 2px 9px;
    border-radius: 999px;
    letter-spacing: 0;
  }

  #entry-form {
    display: grid;
    gap: 16px;
  }

  .field {
    display: grid;
    gap: 6px;
  }

  .field label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 600;
  }

  .field input[type="text"],
  .field textarea {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 11px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    resize: vertical;
  }

  .field input[type="text"]:focus,
  .field textarea:focus,
  .file-upload-btn:focus-visible,
  .btn-primary:focus-visible,
  .btn-cancel:focus-visible,
  .link-btn:focus-visible,
  .action-btn:focus-visible,
  .vote-btn:focus-visible {
    outline: 2px solid var(--red-light);
    outline-offset: 2px;
  }

  .field input[type="text"]::placeholder,
  .field textarea::placeholder { color: #55575e; }

  .file-upload {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .file-upload input[type="file"] {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }

  .file-upload-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red-light);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }

  .file-upload-btn:hover {
    background: var(--red);
    color: #fff;
  }

  .file-name {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .image-preview {
    margin-top: 4px;
    width: 100%;
    max-width: 340px;
    aspect-ratio: 40 / 9;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .form-actions {
    justify-self: start;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn-primary {
    background: var(--red);
    color: #fff;
    border: none;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 12px 26px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .btn-primary:hover { background: var(--red-light); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; cursor: default; }

  .btn-cancel {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: color 0.15s ease, text-decoration-color 0.15s ease;
  }

  .btn-cancel:hover { color: var(--text); text-decoration-color: currentColor; }

  .form-error {
    font-size: 0.8rem;
    color: var(--red-light);
    margin: -6px 0 0;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: rise 0.35s ease both;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  .entry-card:hover {
    border-color: #3a3d45;
    transform: translateY(-2px);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-image-wrap {
    aspect-ratio: 40 / 9;
    background: var(--surface-2);
    overflow: hidden;
  }

  .entry-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
    transition: opacity 0.15s ease;
  }

  .entry-image:hover { opacity: 0.88; }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(6, 6, 7, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
  }

  .lightbox[hidden] { display: none; }

  .lightbox-img {
    max-width: 95vw;
    max-height: 90vh;
    width: auto;
    height: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  }

  .lightbox-close {
    position: absolute;
    top: 18px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease;
  }

  .lightbox-close:hover { border-color: var(--red); color: var(--red-light); }

  .entry-body {
    padding: 14px 16px 6px;
    flex: 1;
  }

  .entry-car {
    font-size: 1.05rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-weight: 600;
  }

  .entry-track {
    margin: 4px 0 0;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .entry-besttime {
    margin: 8px 0 0;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .entry-besttime strong {
    color: var(--text);
    font-family: var(--font-display);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .entry-note {
    margin: 6px 0 0;
    font-size: 0.82rem;
    color: var(--text-muted);
    white-space: pre-wrap;
    line-height: 1.4;
  }

  .entry-weather {
    margin: 8px 0 0;
    font-size: 0.78rem;
    color: var(--text-muted);
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .entry-weather .weather-value { color: var(--text); }

  .entry-event {
    margin: 6px 0 0;
    font-size: 0.78rem;
    color: var(--red-light);
  }

  .track-events {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }

  .track-events h2 {
    font-size: 1.05rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin-bottom: 14px;
  }

  .track-events-select {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
  }

  .track-events-result { margin-top: 16px; }

  .track-events-empty {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin: 0;
  }

  .track-events-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 8px;
  }

  .track-events-list li {
    font-size: 0.85rem;
    color: var(--text);
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .track-events-list li strong { color: var(--red-light); }

  .track-events-note {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin: 14px 0 8px;
  }

  .entry-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 10px 16px 0;
  }

  .action-btn {
    background: none;
    border: none;
    padding: 4px 0;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s ease;
  }

  .action-btn:hover { color: var(--text); }
  .delete-btn:hover { color: var(--red-light); }

  .entry-vote {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 10px 16px 16px;
  }

  .entry-vote-readonly { opacity: 0.85; }

  .vote-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }

  .vote-btn svg { width: 15px; height: 15px; }

  .vote-up:hover { border-color: var(--red); color: var(--red-light); }
  .vote-down:hover { border-color: #5b5d63; color: var(--text); }

  .vote-score {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.3rem;
    min-width: 42px;
    text-align: center;
    position: relative;
    padding: 2px 0;
  }

  .vote-score.positive { color: var(--red-light); }
  .vote-score.negative { color: var(--text-muted); }

  .empty-state {
    display: none;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
  }

  .empty-state.visible { display: block; }

  .site-footer {
    text-align: center;
    color: #55575e;
    font-size: 0.75rem;
    padding: 20px;
    letter-spacing: 0.02em;
  }

  .backup-links {
    margin: 8px 0 0;
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
  }

  .link-btn {
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    color: #55575e;
    font-size: 0.75rem;
    font-family: var(--font-body);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: color 0.15s ease, text-decoration-color 0.15s ease;
  }

  .link-btn:hover { color: var(--text-muted); text-decoration-color: currentColor; }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }

  @media (prefers-reduced-motion: reduce) {
    .entry-card, .btn-primary, .vote-btn, .file-upload-btn {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>

<div class="flag-strip" aria-hidden="true"></div>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top-bar">
      <div class="auth-bar" id="auth-bar">
        <span id="auth-status" class="auth-status">Nicht angemeldet</span>
        <button type="button" id="login-toggle-btn" class="link-btn">Anmelden</button>
        <button type="button" id="logout-btn" class="link-btn" hidden>Abmelden</button>

        <div class="login-dropdown" id="login-dropdown" hidden>
          <form id="login-form" class="login-form" novalidate>
            <input type="email" id="login-email" class="login-input" placeholder="E-Mail" autocomplete="username" required />
            <input type="password" id="login-password" class="login-input" placeholder="Passwort" autocomplete="current-password" required />
            <div class="login-dropdown-actions">
              <button type="submit" class="link-btn">Login</button>
              <button type="button" id="login-cancel-btn" class="link-btn">Abbrechen</button>
            </div>
          </form>
          <p class="form-error" id="login-error" hidden></p>
        </div>
      </div>
    </div>
    <img src="logo.png" alt="Apex Log" class="logo-banner" />
    <p class="eyebrow">Automobilista&nbsp;2 — Session Log</p>
  </div>
</header>

<main>
  <section class="new-entry" aria-labelledby="new-entry-heading">
    <button type="button" id="entry-panel-toggle" class="entry-panel-toggle" aria-expanded="false" aria-controls="entry-panel-body">
      <h2 id="new-entry-heading">Neue Kombination eintragen</h2>
      <span class="entry-panel-chevron" aria-hidden="true">▾</span>
    </button>
    <div id="entry-panel-body" class="entry-panel-body" hidden>
      <p id="entry-form-locked" class="locked-message">Bitte anmelden, um Kombinationen einzutragen, zu bearbeiten oder zu bewerten.</p>
      <form id="entry-form" novalidate hidden>
      <div class="field">
        <label for="car">Auto</label>
        <input type="text" id="car" name="car" list="car-options" placeholder="z. B. Porsche 992 Cup" required />
        <datalist id="car-options"></datalist>
      </div>
      <div class="field">
        <label for="track">Strecke</label>
        <input type="text" id="track" name="track" list="track-options" placeholder="z. B. Interlagos GP" required />
        <datalist id="track-options"></datalist>
      </div>
      <div class="field">
        <label for="best-time">Bestzeit (optional)</label>

  function normalizeKey(str) {
    return (str || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9 ]/g, '')
      .trim();
  }

  const TRACK_KEY_LIST = Object.keys(TRACK_LOCATIONS).map((k) => ({ raw: k, norm: normalizeKey(k) }));

  function findTrackKeyFromText(text) {
    const norm = normalizeKey(text);
    if (!norm) return null;
    let best = null;
    for (const { raw, norm: keyNorm } of TRACK_KEY_LIST) {
      if (norm.includes(keyNorm) || keyNorm.includes(norm)) {
        if (!best || keyNorm.length > best.norm.length) best = { raw, norm: keyNorm };
      }
    }
    return best ? best.raw : null;
  }

  function findTrackLocation(trackName) {
    const key = findTrackKeyFromText(trackName);
    return key ? TRACK_LOCATIONS[key] : null;

  async function fetchJolpicaF1() {
    const res = await fetch('https://api.jolpi.ca/ergast/f1/current.json');
    if (!res.ok) throw new Error('F1-Kalender nicht verfügbar');
    const data = await res.json();
    const races = (data.MRData && data.MRData.RaceTable && data.MRData.RaceTable.Races) || [];
    return races.map((race) => {
      const dateStart = new Date(race.date + 'T' + (race.time || '00:00:00Z'));
      return {
        series: 'F1',
        name: race.raceName,
        dateStart,
        dateEnd: dateStart,
        locationName: (race.Circuit && race.Circuit.circuitName) || '',
      };
    }).filter((e) => !isNaN(e.dateStart));
  }

  async function loadMotorsportEvents() {
    const results = [];

    try {
      results.push(...await fetchJolpicaF1());
    } catch (err) {
      console.error('F1-Kalender:', err);
    }

    motorsportEvents = results;
    motorsportEventsLoaded = true;

    motorsportEventsByTrack = new Map();
    for (const event of motorsportEvents) {
      const trackKey = findTrackKeyFromText(event.locationName);
      if (!trackKey) continue;
      if (!motorsportEventsByTrack.has(trackKey)) motorsportEventsByTrack.set(trackKey, []);
      motorsportEventsByTrack.get(trackKey).push(event);
    }
    for (const list of motorsportEventsByTrack.values()) {
      list.sort((a, b) => a.dateStart - b.dateStart);
    }

    refreshMotorsportLines();
    renderTrackEventsResult();
  }

  function eventLineForTrack(trackKey) {
    const now = new Date();
    const liveList = motorsportEventsByTrack.get(trackKey) || [];
    const nextLive = liveList.find((e) => e.dateEnd >= now);
    if (nextLive) {
      const dateStr = new Intl.DateTimeFormat('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(nextLive.dateStart);
      return '🏁 ' + nextLive.series + ': ' + nextLive.name + ' – ' + dateStr;
    }
    const curated = CURATED_EVENTS[trackKey];
    if (curated && curated.length > 0) {
      return '🏁 ' + curated[0].series + ': ' + curated[0].name + ' (' + curated[0].typical + ')';
    }
    return '';
  }

  function refreshMotorsportLines() {
    document.querySelectorAll('[data-event-track]').forEach((el) => {
      const text = eventLineForTrack(el.dataset.eventTrack);
      if (text) {
        el.textContent = text;
        el.hidden = false;
      } else {
        el.hidden = true;
      }
    });
  }

    return [...seen.values()].sort((a, b) => a.label.localeCompare(b.label, 'de'));
  }

  trackEventsSelect.innerHTML = '<option value="">Strecke wählen …</option>' +
    buildUniqueTrackOptions().map((t) => '<option value="' + t.key + '">' + escapeHtml(t.label) + '</option>').join('');

  function renderTrackEventsResult() {
    const key = trackEventsSelect.value;
    if (!key) { trackEventsResult.innerHTML = ''; return; }

    const now = new Date();
    const live = (motorsportEventsByTrack.get(key) || []).filter((e) => e.dateEnd >= now);
    const curated = CURATED_EVENTS[key] || [];

    if (live.length === 0 && curated.length === 0) {
      trackEventsResult.innerHTML = '<p class="track-events-empty">' +
        (motorsportEventsLoaded ? 'Keine bekannten Events für diese Strecke.' : 'Lade Events …') +
        '</p>';
      return;
    }

    let html = '';
    if (live.length > 0) {
      html += '<ul class="track-events-list">' + live.map((e) => {
        const dateStr = new Intl.DateTimeFormat('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(e.dateStart);
        return '<li><strong>' + escapeHtml(e.series) + '</strong>: ' + escapeHtml(e.name) + ' – ' + dateStr + '</li>';
      }).join('') + '</ul>';
    }
    if (curated.length > 0) {
      html += '<p class="track-events-note">Zusätzlich üblich (nicht live bestätigt, keine exakten Daten):</p>' +
        '<ul class="track-events-list track-events-list--curated">' + curated.map((c) =>
          '<li><strong>' + escapeHtml(c.series) + '</strong>: ' + escapeHtml(c.name) + ' (' + escapeHtml(c.typical) + ')</li>'
        ).join('') + '</ul>';
    }
    trackEventsResult.innerHTML = html;
  }

  trackEventsSelect.addEventListener('change', renderTrackEventsResult);

  loadMotorsportEvents();

  // Analoge Uhr-Emojis (volle Stunde), Index 0 = 12 Uhr
  function localTimeLabel(tz) {
    const now = new Date();
    return new Intl.DateTimeFormat('de-DE', { timeZone: tz, hour: '2-digit', minute: '2-digit' }).format(now);
  }

  function refreshLocalTimes() {
    document.querySelectorAll('[data-tz]').forEach((el) => {
      el.textContent = localTimeLabel(el.dataset.tz);
    });
  }

  setInterval(refreshLocalTimes, 30000);

  const WEATHER_CODE_EMOJI = {
    0: '☀️', 1: '☀️', 2: '⛅', 3: '☁️',
    45: '🌫️', 48: '🌫️',
    51: '🌦️', 53: '🌦️', 55: '🌦️',
    61: '🌧️', 63: '🌧️', 65: '🌧️',
    66: '🌧️', 67: '🌧️',
    71: '❄️', 73: '❄️', 75: '❄️', 77: '❄️',
    80: '🌦️', 81: '🌧️', 82: '🌧️',
    85: '❄️', 86: '❄️',
    95: '⛈️', 96: '⛈️', 99: '⛈️',
  };

  const weatherCache = new Map();
  const WEATHER_TTL_MS = 15 * 60 * 1000;

  async function fetchWeather(lat, lon) {
    const cacheKey = lat + ',' + lon;
    const cached = weatherCache.get(cacheKey);
    if (cached && Date.now() - cached.time < WEATHER_TTL_MS) return cached.data;

    const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,weather_code&timezone=auto';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Wetterdaten nicht verfügbar');
    const data = await res.json();
    weatherCache.set(cacheKey, { data, time: Date.now() });
    return data;
  }

  async function loadWeatherForCards() {
    const keys = new Set();
    grid.querySelectorAll('[data-weather-key]').forEach((el) => keys.add(el.dataset.weatherKey));

    for (const key of keys) {
      const [lat, lon] = key.split(',').map(Number);
      const targets = grid.querySelectorAll('[data-weather-key="' + key + '"] .weather-value');
      try {
        const data = await fetchWeather(lat, lon);
        const temp = Math.round(data.current.temperature_2m);
        const emoji = WEATHER_CODE_EMOJI[data.current.weather_code] || '❔';
        const text = emoji + ' ' + temp + '°C';
        targets.forEach((el) => { el.textContent = text; });
      } catch (err) {
        targets.forEach((el) => { el.textContent = 'nicht verfügbar'; });
      }
    }
  }

  // ---------- Bild-Auswahl ----------

  imageInput.addEventListener('change', async () => {
    const file = imageInput.files[0];
    if (!file) {
      fileNameLabel.textContent = editingId ? 'Aktuelles Bild bleibt erhalten' : 'Keine Datei ausgewählt';
      return;
    }

    if (!file.type.startsWith('image/')) {
      imageInput.value = '';
      formError.textContent = 'Bitte eine Bilddatei auswählen.';
      formError.hidden = false;
      return;
    }

    if (file.size > MAX_IMAGE_BYTES) {
      imageInput.value = '';
      formError.textContent = 'Bild ist zu groß (' + Math.round(file.size / 1024) + ' KB). Maximal ' + Math.round(MAX_IMAGE_BYTES / 1024) + ' KB erlaubt.';
      formError.hidden = false;
      return;
    }

    fileNameLabel.textContent = file.name;
    try {
      pendingImage = await fileToDataUrl(file);
      imagePreview.src = pendingImage;
      imagePreview.hidden = false;
      formError.hidden = true;
    } catch (err) {
      pendingImage = null;
      imagePreview.hidden = true;
      formError.textContent = err.message;
      formError.hidden = false;
    }
  });

  // ---------- Einklapp-Bereich „Neue Kombination eintragen" ----------

  function openEntryPanel() {
    entryPanelBody.hidden = false;
    entryPanelToggle.setAttribute('aria-expanded', 'true');
  }

  function closeEntryPanel() {
    entryPanelBody.hidden = true;
    entryPanelToggle.setAttribute('aria-expanded', 'false');
  }

  entryPanelToggle.addEventListener('click', () => {
    if (entryPanelBody.hidden) openEntryPanel(); else closeEntryPanel();
  });

  // ---------- Bearbeiten-Modus ----------

  function enterEditMode(entry) {
    editingId = entry.id;
    carInput.value = entry.car;
    trackInput.value = entry.track;
    bestTimeInput.value = entry.bestTime || '';
    noteInput.value = entry.note || '';
    pendingImage = entry.image;
    imagePreview.src = entry.image;
    imagePreview.hidden = false;
    fileNameLabel.textContent = 'Aktuelles Bild bleibt erhalten';
    formHeading.textContent = 'Eintrag bearbeiten';
    submitBtn.textContent = 'Aktualisieren';
    cancelBtn.hidden = false;
    formError.hidden = true;
    openEntryPanel();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function exitEditMode() {
    editingId = null;
    form.reset();
    pendingImage = null;
    imagePreview.hidden = true;
    fileNameLabel.textContent = 'Keine Datei ausgewählt';
    formHeading.textContent = 'Neue Kombination eintragen';
    submitBtn.textContent = 'Eintragen';
    cancelBtn.hidden = true;
    formError.hidden = true;
  }

  cancelBtn.addEventListener('click', exitEditMode);

  // ---------- Formular absenden ----------

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!currentUser) return;
    const car = carInput.value.trim();
    const track = trackInput.value.trim();
    const bestTime = bestTimeInput.value.trim();
    const note = noteInput.value.trim();

    if (!car || !track || !pendingImage) {
      formError.textContent = 'Bitte Auto, Strecke und ein Bild angeben.';
      formError.hidden = false;
      return;
    }
    formError.hidden = true;
    submitBtn.disabled = true;
    submitBtn.textContent = editingId ? 'Wird aktualisiert …' : 'Wird gespeichert …';

    const payload = { car, track, image: pendingImage, bestTime, note };

    try {
      if (editingId) {
        await updateDoc(doc(db, 'entries', editingId), payload);
      } else {
        await addDoc(entriesCollection, { ...payload, score: 0, createdAt: serverTimestamp() });
      }
      exitEditMode();
    } catch (err) {
      formError.textContent = 'Fehler beim Speichern: ' + err.message;
      formError.hidden = false;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = editingId ? 'Aktualisieren' : 'Eintragen';
    }
  });

  // ---------- Bild-Lightbox ----------

  function openLightbox(src, alt) {
    lightboxImg.src = src;
    lightboxImg.alt = alt;
    lightbox.hidden = false;
  }

  function closeLightbox() {
    lightbox.hidden = true;
    lightboxImg.src = '';
  }

  grid.addEventListener('click', (e) => {
    const img = e.target.closest('.entry-image');
    if (!img) return;
    openLightbox(img.src, img.alt);
  });

  grid.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const img = e.target.closest('.entry-image');
    if (!img) return;
    e.preventDefault();
    openLightbox(img.src, img.alt);
  });

  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !lightbox.hidden) closeLightbox();
  });

  // ---------- Zufällige Kombi ----------

  randomBtn.addEventListener('click', () => {
    if (currentEntries.length === 0) return;

    let pool = currentEntries.filter((e) => !recentRandomIds.includes(e.id));
    if (pool.length === 0) pool = currentEntries;

    const picked = pool[Math.floor(Math.random() * pool.length)];
    recentRandomIds = [...recentRandomIds, picked.id].slice(-3);

    if (searchTerm) {
      searchTerm = '';
      searchInput.value = '';
    }
    renderView();

    const card = grid.querySelector('[data-id="' + picked.id + '"]');
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.remove('highlight');
      void card.offsetWidth;
      card.classList.add('highlight');
      setTimeout(() => card.classList.remove('highlight'), 1600);
    }
  });

  // ---------- Suche ----------

  searchInput.addEventListener('input', () => {
    searchTerm = searchInput.value.trim().toLowerCase();
    renderView();
  });

  // ---------- Ansicht-Toggle ----------

  viewToggleButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      viewMode = btn.dataset.mode;
      viewToggleButtons.forEach((b) => b.classList.toggle('active', b === btn));
      renderView();
    });
  });

  // ---------- Voting ----------

  grid.addEventListener('click', async (e) => {
    const btn = e.target.closest('.vote-btn');
    if (!btn || !currentUser) return;
    const card = e.target.closest('.entry-card');
    const id = card.dataset.id;
    const delta = Number(btn.dataset.delta);
    btn.disabled = true;
    try {
      await updateDoc(doc(db, 'entries', id), { score: increment(delta) });
    } catch (err) {
      console.error(err);
    } finally {
      btn.disabled = false;
    }
  });

  // ---------- Bearbeiten & Löschen ----------

  grid.addEventListener('click', async (e) => {
    const editBtn = e.target.closest('[data-action="edit"]');
    const deleteBtn = e.target.closest('[data-action="delete"]');
    if ((!editBtn && !deleteBtn) || !currentUser) return;

    const card = e.target.closest('.entry-card');
    const id = card.dataset.id;

    if (editBtn) {
      const entry = currentEntries.find((en) => en.id === id);
      if (entry) enterEditMode(entry);
      return;
    }

    if (deleteBtn) {
      const entry = currentEntries.find((en) => en.id === id);
      const label = entry ? (entry.car + ' auf ' + entry.track) : 'diesen Eintrag';
      if (!confirm('„' + label + '" wirklich löschen? Das kann nicht rückgängig gemacht werden.')) return;
      try {
        await deleteDoc(doc(db, 'entries', id));
        if (editingId === id) exitEditMode();
      } catch (err) {
        alert('Löschen fehlgeschlagen: ' + err.message);
      }
    }
  });

  // ---------- JSON-Backup: Export ----------

  exportBtn.addEventListener('click', () => {
    const date = new Date().toISOString().slice(0, 10);
    const data = currentEntries.map((entry) => ({
      car: entry.car,
      track: entry.track,
      image: entry.image,
      score: entry.score,
      bestTime: entry.bestTime || '',
      note: entry.note || '',
    }));
    downloadJson('apex-log-backup-' + date + '.json', data);
  });

  // ---------- JSON-Backup: Import ----------

  importInput.addEventListener('change', async () => {
    const file = importInput.files[0];
    if (!file || !currentUser) return;

    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('Die Datei enthält keine gültige Backup-Liste.');

      const valid = data.filter((item) => item && item.car && item.track && item.image);
      if (valid.length === 0) throw new Error('Keine gültigen Einträge in der Datei gefunden.');

      const proceed = confirm(
        valid.length + ' Einträge gefunden. Wirklich importieren?\n\n' +
        'Hinweis: Bestehende Einträge bleiben unverändert, es findet kein Abgleich statt ' +
        '(ein zweiter Import derselben Datei erzeugt Duplikate).'
      );
      if (!proceed) return;

      for (const item of valid) {
        await addDoc(entriesCollection, {
          car: String(item.car),
          track: String(item.track),
          image: String(item.image),
          score: Number.isInteger(item.score) ? item.score : 0,
          bestTime: item.bestTime ? String(item.bestTime) : '',
          note: item.note ? String(item.note) : '',
          createdAt: serverTimestamp(),
        });
      }
      alert('Import abgeschlossen: ' + valid.length + ' Einträge hinzugefügt.');
    } catch (err) {
      alert('Import fehlgeschlagen: ' + err.message);
    } finally {
      importInput.value = '';
    }
  });

  // ---------- Rendering ----------

  function cardHtml(entry) {
    const scoreClass = entry.score > 0 ? 'positive' : entry.score < 0 ? 'negative' : '';
    const scoreLabel = entry.score > 0 ? ('+' + entry.score) : entry.score;
    const bestTimeHtml = entry.bestTime
      ? '<p class="entry-besttime">Bestzeit: <strong>' + escapeHtml(entry.bestTime) + '</strong></p>'
      : '';
    const noteHtml = entry.note
      ? '<p class="entry-note">' + escapeHtml(entry.note) + '</p>'
      : '';
    const carTrackLabel = escapeHtml(entry.car) + ' auf ' + escapeHtml(entry.track);
    const location = findTrackLocation(entry.track);
    const weatherHtml = location
      ? '<p class="entry-weather" data-weather-key="' + location.lat + ',' + location.lon + '">' +
          escapeHtml(location.label) + ' · ' +
          '<span class="time-value" data-tz="' + location.tz + '">' + localTimeLabel(location.tz) + '</span>' +
          ' · <span class="weather-value">wird geladen …</span>' +
        '</p>'
      : '';

    const trackKey = findTrackKeyFromText(entry.track);
    const eventText = trackKey ? eventLineForTrack(trackKey) : '';
    const motorsportHtml = trackKey
      ? '<p class="entry-event" data-event-track="' + trackKey + '"' + (eventText ? '' : ' hidden') + '>' + escapeHtml(eventText) + '</p>'
      : '';

    const actionsHtml = currentUser
      ? '<div class="entry-actions">' +
          '<button type="button" class="action-btn" data-action="edit">Bearbeiten</button>' +
          '<button type="button" class="action-btn delete-btn" data-action="delete">Löschen</button>' +
        '</div>'
      : '';

    const voteHtml = currentUser
      ? '<div class="entry-vote">' +
          '<button class="vote-btn vote-down" data-delta="-1" aria-label="Downvote ' + carTrackLabel + '">' + iconDown + '</button>' +
          '<span class="vote-score ' + scoreClass + '">' + scoreLabel + '</span>' +
          '<button class="vote-btn vote-up" data-delta="1" aria-label="Upvote ' + carTrackLabel + '">' + iconUp + '</button>' +
        '</div>'
      : '<div class="entry-vote entry-vote-readonly"><span class="vote-score ' + scoreClass + '">' + scoreLabel + '</span></div>';

    return (
      '<article class="entry-card" data-id="' + entry.id + '">' +
        '<div class="entry-image-wrap">' +
          '<img class="entry-image" src="' + entry.image + '" alt="' + carTrackLabel + '" tabindex="0" role="button" aria-label="Bild von ' + carTrackLabel + ' in Originalgröße ansehen" />' +
        '</div>' +
        '<div class="entry-body">' +
          '<h3 class="entry-car">' + escapeHtml(entry.car) + '</h3>' +
          '<p class="entry-track">' + escapeHtml(entry.track) + '</p>' +
          bestTimeHtml +
          noteHtml +
          weatherHtml +
          motorsportHtml +
        '</div>' +
        actionsHtml +
        voteHtml +
      '</article>'
    );
  }

  function getFilteredEntries() {
    if (!searchTerm) return currentEntries;
    return currentEntries.filter((entry) => {
      const haystack = (
        (entry.car || '') + ' ' + (entry.track || '') + ' ' + (entry.note || '')
      ).toLowerCase();
      return haystack.includes(searchTerm);
    });
  }

  function renderView() {
    const filtered = getFilteredEntries();

    if (currentEntries.length > 0 && filtered.length === 0) {
      grid.innerHTML = '<p class="empty-state visible">Keine Treffer für „' + escapeHtml(searchInput.value.trim()) + '".</p>';
      return;
    }

    if (viewMode === 'all') {
      grid.innerHTML = '<div class="card-grid">' + filtered.map(cardHtml).join('') + '</div>';
      loadWeatherForCards();
      refreshMotorsportLines();
      return;
    }

    const groupField = viewMode === 'car' ? 'car' : 'track';
    const groups = new Map();
    filtered.forEach((entry) => {
      const key = entry[groupField] || '–';
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(entry);
    });

    const sortedKeys = [...groups.keys()].sort((a, b) => a.localeCompare(b, 'de'));

    grid.innerHTML = sortedKeys.map((key) => {
      const groupEntries = groups.get(key).slice().sort((a, b) => b.score - a.score);
      return (
        '<div class="entry-group">' +
          '<h3 class="group-heading">' + escapeHtml(key) + ' <span class="group-count">' + groupEntries.length + '</span></h3>' +
          '<div class="card-grid">' + groupEntries.map(cardHtml).join('') + '</div>' +
        '</div>'
      );
    }).join('');
    loadWeatherForCards();
    refreshMotorsportLines();
  }

  function updateDatalists() {
    const cars = [...new Set(currentEntries.map((e) => e.car).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'de'));
    const tracks = [...new Set(currentEntries.map((e) => e.track).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'de'));
    carOptions.innerHTML = cars.map((c) => '<option value="' + escapeHtml(c) + '"></option>').join('');
    trackOptions.innerHTML = tracks.map((t) => '<option value="' + escapeHtml(t) + '"></option>').join('');
  }

  function updateStatsLine() {
    const cars = new Set(currentEntries.map((e) => e.car).filter(Boolean)).size;
    const tracks = new Set(currentEntries.map((e) => e.track).filter(Boolean)).size;
    statsLine.textContent = currentEntries.length + ' Kombinationen · ' + cars + ' Autos · ' + tracks + ' Strecken';
  }

  function renderEntries(entries) {
    currentEntries = entries;
    entryCount.textContent = entries.length;
    emptyState.textContent = 'Noch keine Strecken-Kombination geloggt. Leg los und trag deine erste Session ein.';
    emptyState.classList.toggle('visible', entries.length === 0);
    updateDatalists();
    updateStatsLine();
    renderView();
  }


  // Live-Listener: rendert automatisch neu, sobald sich in Firestore etwas ändert.
  const entriesQuery = query(entriesCollection, orderBy('score', 'desc'));
  onSnapshot(
    entriesQuery,
    (snapshot) => {
      const entries = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
      renderEntries(entries);
    },
    (err) => {
      console.error(err);
      emptyState.textContent = 'Verbindung zu Firebase fehlgeschlagen. Bitte Firestore-Regeln und Projekt-Setup prüfen.';
      emptyState.classList.add('visible');
    }
  );
</script>
</body>
</html>
